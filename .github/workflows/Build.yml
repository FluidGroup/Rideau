name: Build

on:
  push:
    branches: "**"
  pull_request:
    branches: "**"

jobs:
  build:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.4"
      - name: xcodebuild
        run: xcodebuild -scheme Rideau -sdk iphoneos CODE_SIGNING_ALLOWED=NO
